{% extends "base.html" %}
{% block content %}
<h2>Set password</h2>
<form method="post">
  {% csrf_token %}
  <div class="field">
    <label>New password</label>
    <input type="password" name="password" required />
  </div>
  <div class="field">
    <label>Confirm password</label>
    <input type="password" name="confirm_password" required />
  </div>
  <button type="submit">Save</button>
</form>
{% endblock %}
